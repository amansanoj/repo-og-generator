<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-site-verification" content="NrnZ8xzyO1ENanJHP7rB2nRHKAQXz9tc2atU9DNNCHM" />
  <meta property="og:title" content="Repo OG Generator" />
  <meta property="og:description" content="Instantly generate beautiful, dynamic social share images for your GitHub projects." />
  <meta property="og:image" content="https://repo-og-generator.vercel.app/og-home.png" />
  <meta property="og:url" content="https://repo-og-generator.vercel.app" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://repo-og-generator.vercel.app/og-home.png" />
  <title>Repo OG Generator</title>
  <script>
    (() => {
      const media = window.matchMedia('(prefers-color-scheme: dark)')
      const applyTheme = (isDark) => {
        document.documentElement.classList.toggle('dark', isDark)
        document.documentElement.style.colorScheme = isDark ? 'dark' : 'light'
      }

      applyTheme(media.matches)

      if (media.addEventListener) {
        media.addEventListener('change', (event) => applyTheme(event.matches))
      } else if (media.addListener) {
        media.addListener((event) => applyTheme(event.matches))
      }
    })()
  </script>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/api/brand-css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ui-bg: var(--background);
      --ui-surface: var(--card);
      --ui-border: var(--border);
      --ui-text: var(--foreground);
      --ui-muted: var(--muted-foreground);
      --ui-input-bg: var(--muted);
      --ui-primary: var(--primary);
      --ui-primary-hover: var(--primary-light);
      --ui-secondary: var(--secondary);
      --ui-radius: var(--radius);
      --ui-font: var(--font-sans);
      --ui-mono: 'JetBrains Mono', monospace;
    }
    body {
      font-family: var(--ui-font);
      background: linear-gradient(180deg, var(--ui-bg) 0%, var(--ui-input-bg) 100%);
      color: var(--ui-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.25rem 5rem;
    }
    .wrapper { width: 100%; max-width: 520px; display: flex; flex-direction: column; gap: 2rem; }
    .header { display: flex; flex-direction: column; gap: 0.3rem; }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    .gh-link { color: var(--ui-muted); transition: color 0.15s; display: flex; align-items: center; }
    .gh-link:hover { color: var(--ui-text); }
    .header h1 { font-size: 1.35rem; font-weight: 600; letter-spacing: -0.01em; }
    .header p { font-size: 0.875rem; color: var(--ui-muted); }
    .form { display: flex; flex-direction: column; gap: 1rem; }
    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    label { font-size: 0.8rem; font-weight: 500; color: var(--ui-muted); }
    .optional { font-weight: 400; color: var(--ui-muted); margin-left: 0.2rem; }
    input, textarea {
      width: 100%; background: var(--ui-input-bg); border: 1px solid var(--ui-border); color: var(--ui-text);
      border-radius: var(--ui-radius); padding: 0.5rem 0.75rem; font-size: 0.875rem; font-family: var(--ui-font);
      outline: none; transition: border-color 0.15s; appearance: none;
    }
    input::placeholder, textarea::placeholder { color: var(--ui-muted); }
    input:focus, textarea:focus { border-color: var(--ui-primary); }
    textarea { resize: vertical; min-height: 72px; line-height: 1.55; }
    .radio-group { display: flex; gap: 0.5rem; }
    .radio-label {
      display: flex; align-items: center; gap: 0.4rem; font-size: 0.875rem; color: var(--ui-text); font-weight: 400;
      cursor: pointer; padding: 0.5rem 0.75rem; border: 1px solid var(--ui-border); border-radius: var(--ui-radius);
      background: var(--ui-input-bg); transition: border-color 0.15s; flex: 1; justify-content: center;
    }
    .radio-label:has(input:checked) { border-color: var(--ui-primary); color: var(--ui-text); }
    .radio-label input[type=radio] { display: none; }
    .row { display: flex; gap: 0.75rem; }
    .row .field { flex: 1; }
    .scale-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.35rem; }
    .scale-row label { margin: 0; }
    .scale-val { font-size: 0.8rem; font-family: var(--ui-mono); color: var(--ui-muted); }
    input[type=range] {
      -webkit-appearance: none; appearance: none; padding: 0; border: none; background: none; box-shadow: none;
      cursor: pointer; width: 100%; height: 20px;
    }
    input[type=range]::-webkit-slider-runnable-track { height: 2px; background: var(--ui-border); border-radius: 1px; }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--ui-text); border: none;
      margin-top: -6px; transition: background 0.15s;
    }
    input[type=range]:hover::-webkit-slider-thumb { background: var(--ui-primary); }
    input[type=range]::-moz-range-track { height: 2px; background: var(--ui-border); border-radius: 1px; }
    input[type=range]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--ui-text); border: none; }
    .btn {
      background: var(--ui-primary); color: var(--primary-foreground); border: none; border-radius: var(--ui-radius); padding: 0.55rem 1rem;
      font-size: 0.875rem; font-weight: 500; font-family: var(--ui-font); cursor: pointer; width: 100%;
      transition: background 0.15s; margin-top: 0.25rem;
    }
    .btn:hover { background: var(--ui-primary-hover); }
    .btn:active { opacity: 0.9; }
    .preview { display: none; flex-direction: column; gap: 0.75rem; border-top: 1px solid var(--ui-border); padding-top: 1.5rem; }
    .preview img { width: 100%; border-radius: var(--ui-radius); border: 1px solid var(--ui-border); }
    .url-row {
      display: flex; align-items: center; gap: 0.5rem; background: var(--ui-input-bg); border: 1px solid var(--ui-border);
      border-radius: var(--ui-radius); padding: 0.45rem 0.5rem 0.45rem 0.75rem;
    }
    .url-text {
      flex: 1; font-size: 0.72rem; color: var(--ui-muted); font-family: var(--ui-mono); overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .copy-btn {
      flex-shrink: 0; background: var(--ui-surface); color: var(--ui-muted); border: 1px solid var(--ui-border);
      border-radius: calc(var(--ui-radius) * 0.75); padding: 0.25rem 0.6rem; font-size: 0.72rem;
      font-family: var(--ui-font); font-weight: 500; cursor: pointer; transition: color 0.15s, border-color 0.15s;
    }
    .copy-btn:hover { color: var(--ui-text); border-color: var(--ui-primary-hover); }
    .copy-btn.copied { color: var(--ui-secondary); }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <div class="header-top">
        <h1>Repo OG Generator</h1>
        <a href="https://github.com/amansanoj/repo-og-generator" target="_blank" rel="noopener" class="gh-link" aria-label="GitHub">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M216,104v8a56.06,56.06,0,0,1-48.44,55.47A39.8,39.8,0,0,1,176,192v40a8,8,0,0,1-8,8H104a8,8,0,0,1-8-8V216H72a40,40,0,0,1-40-40A24,24,0,0,0,8,152a8,8,0,0,1,0-16,40,40,0,0,1,40,40,24,24,0,0,0,24,24H96v-8a39.8,39.8,0,0,1,8.44-24.53A56.06,56.06,0,0,1,56,112v-8a58.14,58.14,0,0,1,7.69-28.32A59.78,59.78,0,0,1,69.07,28,8,8,0,0,1,76,24a59.75,59.75,0,0,1,48,24h24a59.75,59.75,0,0,1,48-24,8,8,0,0,1,6.93,4,59.74,59.74,0,0,1,5.37,47.68A58,58,0,0,1,216,104Z"></path></svg>
        </a>
      </div>
      <p>Instantly generate beautiful, dynamic social share images for your GitHub projects.</p>
    </div>

    <div class="form">
      <div class="field">
        <label for="reponame">Repository name</label>
        <input id="reponame" type="text" placeholder="my-awesome-project" />
      </div>
      <div class="field">
        <label for="description">Description</label>
        <textarea id="description" placeholder="A short description of your project."></textarea>
      </div>
      <div class="row">
        <div class="field">
          <label for="url">URL <span class="optional">optional</span></label>
          <input id="url" type="text" placeholder="example.com" />
        </div>
        <div class="field">
          <label id="variant-label">Variant</label>
          <div class="radio-group" id="variant-options" role="radiogroup" aria-labelledby="variant-label"></div>
        </div>
      </div>
      <div class="field">
        <div class="scale-row">
          <label for="scale">Scale</label>
          <span class="scale-val" id="scale-label">1×</span>
        </div>
        <input id="scale" type="range" min="0.1" max="3" step="0.1" value="1" />
      </div>
      <button class="btn" id="generate-btn" type="button">Generate</button>
    </div>

    <div class="preview" id="preview-wrap">
      <img id="preview-img" src="" alt="OG Preview" />
      <div class="url-row">
        <span class="url-text" id="url-box"></span>
        <button class="copy-btn" id="copy-btn" type="button">Copy</button>
      </div>
    </div>
  </div>

  <script>
    async function loadVariants() {
      const container = document.getElementById('variant-options')
      try {
        const response = await fetch('/api/config')
        const config = await response.json()
        container.innerHTML = config.variants
          .map((variant, index) => {
            const checked = index === 0 ? ' checked' : ''
            return `<label class="radio-label"><input type="radio" name="variant" value="${variant.value}"${checked} />${variant.label}</label>`
          })
          .join('')
      } catch {
        container.innerHTML = '<label class="radio-label"><input type="radio" name="variant" value="primary" checked />Primary</label>'
      }
    }

    function buildUrl() {
      const reponame = document.getElementById('reponame').value.trim() || 'my-project'
      const description = document.getElementById('description').value.trim()
      const url = document.getElementById('url').value.trim()
      const variantInput = document.querySelector('input[name=variant]:checked')
      const variant = variantInput ? variantInput.value : 'primary'
      const scale = document.getElementById('scale').value
      const params = new URLSearchParams()
      if (description) params.set('description', description)
      if (url) params.set('url', url)
      if (variant !== 'primary') params.set('variant', variant)
      if (scale !== '1') params.set('scale', scale)
      const query = params.toString().split('+').join('%20')
      return query ? '/' + encodeURIComponent(reponame) + '?' + query : '/' + encodeURIComponent(reponame)
    }

    function generate() {
      const u = buildUrl()
      const wrap = document.getElementById('preview-wrap')
      const img = document.getElementById('preview-img')
      const box = document.getElementById('url-box')
      img.src = u + (u.includes('?') ? '&' : '?') + 't=' + Date.now()
      box.textContent = window.location.origin + u
      wrap.style.display = 'flex'
    }

    function copyUrl() {
      const text = document.getElementById('url-box').textContent
      const btn = document.getElementById('copy-btn')
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied'
        btn.classList.add('copied')
        setTimeout(() => {
          btn.textContent = 'Copy'
          btn.classList.remove('copied')
        }, 1500)
      })
    }

    document.getElementById('scale').addEventListener('input', function () {
      document.getElementById('scale-label').textContent = this.value + '×'
    })

    document.getElementById('generate-btn').addEventListener('click', generate)
    document.getElementById('copy-btn').addEventListener('click', copyUrl)
    loadVariants()
  </script>
</body>
</html>
